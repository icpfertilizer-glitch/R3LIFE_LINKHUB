<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - R3 Life Clinique</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="dna-bg"><canvas id="dna-canvas"></canvas></div>
  <div class="bg-orbs" id="bg-orbs"></div>
  <div class="container">
    <header class="header">
      <div class="logo">
        <h1>R3 Life Clinique</h1>
        <p class="tagline">Admin Panel</p>
      </div>
      <div class="header-actions">
        <a href="/" class="btn btn-outline btn-sm">Home</a>
        <button id="logout-btn" class="btn btn-outline btn-sm" style="display:none;">Logout</button>
      </div>
    </header>

    <!-- Login Form -->
    <div id="login-section" class="card login-card">
      <h2>Admin Login</h2>
      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <div id="login-error" class="error-msg" style="display:none;"></div>
        <button type="submit" class="btn btn-primary btn-full">Login</button>
      </form>
    </div>

    <!-- Admin Panel -->
    <div id="admin-section" style="display:none;">
      <!-- Tab Navigation -->
      <div class="admin-tabs">
        <button class="tab-btn active" data-tab="tab-menus">Menus</button>
        <button class="tab-btn" data-tab="tab-users">Manage Users</button>
      </div>

      <!-- Tab: Menus -->
      <div id="tab-menus" class="tab-content active">
      <!-- Category Management -->
      <div class="card">
        <h2>Categories</h2>
        <p class="hint">Drag and drop to reorder</p>
        <div class="category-add-row">
          <input type="text" id="category-name" placeholder="ชื่อหมวดหมู่ใหม่" class="category-input">
          <button class="btn btn-primary btn-sm" id="add-category-btn">Add</button>
        </div>
        <div id="category-list" class="category-list">
          <!-- Categories loaded dynamically -->
        </div>
      </div>

      <!-- Add / Edit Menu Form -->
      <div class="card">
        <h2 id="form-title">Add New Menu</h2>
        <form id="menu-form">
          <input type="hidden" id="edit-id">
          <div class="form-row">
            <div class="form-group">
              <label for="menu-name">Menu Name</label>
              <input type="text" id="menu-name" required placeholder="e.g. Facebook">
            </div>
            <div class="form-group">
              <label for="menu-url">URL</label>
              <input type="url" id="menu-url" required placeholder="https://example.com">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="menu-category">Category</label>
              <select id="menu-category" class="form-select">
                <option value="">-- ไม่มีหมวดหมู่ --</option>
              </select>
            </div>
            <div class="form-group">
              <label for="menu-image">Image</label>
              <div class="file-input-wrapper">
                <input type="file" id="menu-image" accept="image/*">
                <div id="image-preview" class="image-preview"></div>
              </div>
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="submit-btn">Add Menu</button>
            <button type="button" class="btn btn-outline" id="cancel-btn" style="display:none;">Cancel</button>
          </div>
        </form>
      </div>

      <!-- Menu List -->
      <div class="card">
        <h2>Menu List</h2>
        <p class="hint">Drag and drop to reorder</p>
        <div id="admin-menu-list" class="admin-menu-list">
          <!-- Items loaded dynamically -->
        </div>
      </div>
      </div>

      <!-- Tab: Users -->
      <div id="tab-users" class="tab-content">
        <div class="card">
          <h2>Register New User</h2>
          <p class="hint">เพิ่ม user ที่อนุญาตให้เข้าใช้งาน (ใส่ email Microsoft)</p>
          <div class="category-add-row">
            <input type="email" id="new-user-email" placeholder="user@company.com" class="category-input">
            <input type="text" id="new-user-name" placeholder="ชื่อ (ไม่บังคับ)" class="category-input" style="max-width:200px;">
            <button class="btn btn-primary btn-sm" id="add-user-btn">Add User</button>
          </div>
        </div>
        <div class="card">
          <h2>User Permissions</h2>
          <p class="hint">User ต้องได้รับอนุมัติ (Approved) ก่อนถึงจะเข้าใช้งานได้</p>
          <div id="user-list" class="user-list">
            <!-- Users loaded dynamically -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/admin.js"></script>
  <script src="/js/bg.js"></script>
</body>
</html>
