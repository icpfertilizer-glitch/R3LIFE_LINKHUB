<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R3 Life Clinique - Link Hub</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="dna-bg"><canvas id="dna-canvas"></canvas></div>
  <div class="bg-orbs" id="bg-orbs"></div>
  <div class="container">
    <header class="header">
      <div class="logo">
        <h1>R3 Life Clinique</h1>
        <p class="tagline">Link Hub</p>
      </div>
      <div id="user-info" class="user-info" style="display:none;">
        <span id="user-name" class="user-name"></span>
        <a href="/auth/logout" class="btn btn-outline btn-sm">Logout</a>
      </div>
    </header>

    <main id="main-content">
      <!-- Categories and menus loaded dynamically -->
      <div id="empty-state" class="empty-state" style="display:none;">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <p>ยังไม่มีลิงค์</p>
      </div>
    </main>

    <div class="footer-push"></div>
  </div>
  <footer class="footer">
    <p><a href="/admin" class="footer-link">&copy; 2026 R3 Life Clinique Link Hub</a></p>
  </footer>

  <script src="/js/emoji-picker.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/bg.js"></script>
</body>
</html>
